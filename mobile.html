<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>BS Clients</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ── Reset & base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --primary: #1e3a5f;
    --primary-light: #e8f0fb;
    --accent: #3b82f6;
    --bg: #f0f4f8;
    --card: #ffffff;
    --text: #1a1a2e;
    --text-muted: #64748b;
    --border: #e2e8f0;
    --danger: #ef4444;
    --danger-bg: #fef2f2;
    --success: #22c55e;
    --success-bg: #f0fdf4;
    --warning: #f59e0b;
    --warning-bg: #fffbeb;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
    --shadow-lg: 0 8px 32px rgba(0,0,0,.14);
    --radius: 14px;
    --tab-h: 82px;
    --header-h: 56px;
    --safe-top: env(safe-area-inset-top, 44px);
    --safe-bottom: env(safe-area-inset-bottom, 34px);
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  [data-theme="dark"] {
    --primary: #60a5fa;
    --primary-light: #1e3a5f;
    --bg: #0f172a;
    --card: #1e293b;
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --border: #334155;
  }
  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); }

  /* ── Screens ── */
  .screen { position: fixed; inset: 0; display: none; flex-direction: column; background: var(--bg); }
  .screen.active { display: flex; }

  /* ── Profile / Login ── */
  #screen-profile {
    align-items: center; justify-content: center; gap: 32px;
    background: linear-gradient(160deg, #1e3a5f 0%, #0f172a 100%);
  }
  .profile-logo { font-size: 28px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
  .profile-sub { font-size: 13px; color: rgba(255,255,255,.5); margin-top: -24px; }
  .profile-cards { display: flex; gap: 16px; }
  .profile-card {
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 20px;
    padding: 24px 20px;
    text-align: center;
    cursor: pointer;
    transition: transform .15s, background .15s;
    min-width: 120px;
  }
  .profile-card:active { transform: scale(.96); background: rgba(255,255,255,.14); }
  .profile-avatar {
    width: 64px; height: 64px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; font-weight: 700; color: #fff;
    margin: 0 auto 12px;
  }
  .profile-name { font-size: 15px; font-weight: 600; color: #fff; }
  .profile-role { font-size: 11px; color: rgba(255,255,255,.45); margin-top: 2px; }

  /* ── App shell ── */
  #screen-app { padding-top: var(--safe-top); }

  /* ── Header ── */
  .m-header {
    height: var(--header-h);
    background: var(--card);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 16px;
    gap: 10px;
    flex-shrink: 0;
    box-shadow: 0 1px 0 var(--border);
  }
  .m-header-title { font-size: 17px; font-weight: 700; color: var(--primary); flex: 1; }
  .m-header-count {
    background: var(--primary); color: #fff;
    font-size: 11px; font-weight: 600;
    padding: 2px 8px; border-radius: 20px;
  }
  .m-header-btn {
    width: 36px; height: 36px; border-radius: 50%;
    border: none; background: var(--primary-light);
    color: var(--primary); font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: background .12s;
    flex-shrink: 0;
  }
  .m-header-btn:active { background: var(--border); }

  /* ── Search bar ── */
  .m-search {
    padding: 10px 16px 8px;
    flex-shrink: 0;
    background: var(--card);
    border-bottom: 1px solid var(--border);
  }
  .m-search input {
    width: 100%; height: 36px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 0 12px 0 36px;
    font-size: 14px; color: var(--text);
    outline: none; font-family: inherit;
  }
  .m-search input::placeholder { color: var(--text-muted); }
  .m-search-wrap { position: relative; }
  .m-search-icon {
    position: absolute; left: 11px; top: 50%;
    transform: translateY(-50%);
    font-size: 14px; color: var(--text-muted); pointer-events: none;
  }

  /* ── Lead list ── */
  .m-list {
    flex: 1; overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 10px 14px calc(var(--tab-h) + 10px);
  }
  .m-list::-webkit-scrollbar { display: none; }

  .lead-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 10px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: transform .1s, box-shadow .1s;
    position: relative;
    overflow: hidden;
  }
  .lead-card:active { transform: scale(.985); box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .lead-card.starred { border-left: 3px solid var(--warning); }
  .lead-card.overdue { border-left: 3px solid var(--danger); }
  .lead-card.review { border-left: 3px solid var(--success); }
  .lead-card.drop-alert { border-left: 3px solid var(--danger); background: #fff5f5; }
  [data-theme="dark"] .lead-card.drop-alert { background: #2d1515; }

  .lead-card-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
  .lead-avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--primary-light); color: var(--primary);
    font-size: 16px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .lead-info { flex: 1; min-width: 0; }
  .lead-name {
    font-size: 15px; font-weight: 600; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .lead-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  .lead-badges { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
  .badge {
    font-size: 10px; font-weight: 600; padding: 2px 7px;
    border-radius: 6px; display: inline-flex; align-items: center; gap: 3px;
  }
  .badge-status { background: var(--primary-light); color: var(--primary); }
  .badge-status.hot { background: #fee2e2; color: #dc2626; }
  .badge-status.cold { background: #dbeafe; color: #1d4ed8; }
  .badge-atty { background: #f3e8ff; color: #7c3aed; }
  .badge-ffup { background: var(--warning-bg); color: #92400e; }
  .badge-ffup.today { background: #fef9c3; color: #854d0e; font-weight: 700; }
  .badge-new { background: var(--danger); color: #fff; }
  .badge-overdue { background: var(--danger-bg); color: var(--danger); }

  .lead-chk-row { display: flex; gap: 12px; align-items: center; }
  .chk-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-muted); }
  .chk-item input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--primary); cursor: pointer; }

  .lead-card-arrow {
    position: absolute; right: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--border); font-size: 18px;
  }

  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--text-muted); font-size: 14px;
  }
  .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }

  /* ── Bottom tab bar ── */
  .m-tabbar {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: var(--tab-h);
    padding-bottom: var(--safe-bottom);
    background: var(--card);
    border-top: 1px solid var(--border);
    display: flex;
    box-shadow: 0 -2px 12px rgba(0,0,0,.06);
    z-index: 100;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .m-tabbar::-webkit-scrollbar { display: none; }
  .m-tab {
    flex: 1; min-width: 56px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 3px; cursor: pointer;
    transition: color .12s; padding: 0 6px;
    border: none; background: none; color: var(--text-muted);
    font-family: inherit; position: relative;
  }
  .m-tab.active { color: var(--primary); }
  .m-tab-icon { font-size: 18px; }
  .m-tab-label { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: .3px; }
  .m-tab-badge {
    position: absolute; top: 6px; right: calc(50% - 16px);
    background: var(--danger); color: #fff;
    font-size: 9px; font-weight: 700;
    min-width: 16px; height: 16px;
    border-radius: 8px; padding: 0 4px;
    display: flex; align-items: center; justify-content: center;
  }
  .m-tab-badge:empty, .m-tab-badge[data-n="0"] { display: none; }

  /* ── Detail sheet ── */
  .detail-sheet {
    position: fixed; inset: 0; z-index: 200;
    pointer-events: none;
  }
  .detail-sheet.open { pointer-events: all; }
  .detail-backdrop {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0);
    transition: background .28s;
  }
  .detail-sheet.open .detail-backdrop { background: rgba(0,0,0,.45); }
  .detail-panel {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: var(--card);
    border-radius: 24px 24px 0 0;
    max-height: 92vh;
    transform: translateY(100%);
    transition: transform .32s cubic-bezier(.32,1,.6,1);
    display: flex; flex-direction: column;
    padding-bottom: var(--safe-bottom);
  }
  .detail-sheet.open .detail-panel { transform: translateY(0); }

  .detail-handle {
    width: 36px; height: 4px; border-radius: 2px;
    background: var(--border); margin: 12px auto 0;
    flex-shrink: 0;
  }
  .detail-header {
    padding: 14px 20px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    display: flex; align-items: flex-start; gap: 12px;
  }
  .detail-avatar {
    width: 48px; height: 48px; border-radius: 50%;
    background: var(--primary); color: #fff;
    font-size: 20px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .detail-name { font-size: 18px; font-weight: 700; color: var(--text); }
  .detail-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .detail-close {
    margin-left: auto; width: 32px; height: 32px;
    border-radius: 50%; border: none;
    background: var(--bg); color: var(--text-muted);
    font-size: 18px; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: inherit;
  }

  .detail-body {
    flex: 1; overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 16px 20px;
  }
  .detail-body::-webkit-scrollbar { display: none; }

  .detail-section { margin-bottom: 20px; }
  .detail-section-title {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .8px; color: var(--text-muted);
    margin-bottom: 10px;
  }
  .detail-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .detail-row:last-child { border-bottom: none; }
  .detail-row-icon { font-size: 16px; width: 24px; text-align: center; flex-shrink: 0; }
  .detail-row-label { font-size: 11px; color: var(--text-muted); width: 72px; flex-shrink: 0; }
  .detail-row-value { font-size: 14px; color: var(--text); flex: 1; font-weight: 500; }
  .detail-row-value a { color: var(--accent); text-decoration: none; }

  .detail-chk-grid {
    display: grid; grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }
  .detail-chk-item {
    display: flex; flex-direction: column;
    align-items: center; gap: 4px;
    padding: 10px 6px;
    background: var(--bg); border-radius: 10px;
    border: 1px solid var(--border);
  }
  .detail-chk-item input { width: 20px; height: 20px; accent-color: var(--primary); cursor: pointer; }
  .detail-chk-label { font-size: 9px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; }

  .detail-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 4px; }
  .detail-action-btn {
    height: 44px; border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--bg); color: var(--text);
    font-size: 13px; font-weight: 600;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    cursor: pointer; font-family: inherit;
    transition: background .12s, transform .1s;
  }
  .detail-action-btn:active { transform: scale(.97); }
  .detail-action-btn.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
  .detail-action-btn.danger { background: var(--danger-bg); color: var(--danger); border-color: #fca5a5; }

  /* Status & attorney pickers inline */
  .inline-select {
    flex: 1; height: 32px;
    border: 1px solid var(--border); border-radius: 8px;
    background: var(--bg); color: var(--text);
    font-size: 13px; padding: 0 8px;
    font-family: inherit; outline: none;
  }

  /* ── Notes textarea in detail ── */
  .detail-notes-input {
    width: 100%; min-height: 72px;
    border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 12px; font-size: 13px;
    background: var(--bg); color: var(--text);
    resize: none; font-family: inherit; outline: none;
  }

  /* ── Move sheet ── */
  .move-sheet {
    position: fixed; inset: 0; z-index: 300; pointer-events: none;
  }
  .move-sheet.open { pointer-events: all; }
  .move-backdrop {
    position: absolute; inset: 0; background: rgba(0,0,0,0);
    transition: background .2s;
  }
  .move-sheet.open .move-backdrop { background: rgba(0,0,0,.5); }
  .move-panel {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: var(--card); border-radius: 20px 20px 0 0;
    padding: 16px 0 calc(16px + var(--safe-bottom));
    transform: translateY(100%);
    transition: transform .28s cubic-bezier(.32,1,.6,1);
  }
  .move-sheet.open .move-panel { transform: translateY(0); }
  .move-title {
    font-size: 13px; font-weight: 700; color: var(--text-muted);
    text-align: center; padding: 0 20px 12px;
    border-bottom: 1px solid var(--border); margin-bottom: 8px;
  }
  .move-item {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 20px; font-size: 15px; font-weight: 500;
    cursor: pointer; transition: background .1s;
  }
  .move-item:active { background: var(--bg); }
  .move-item-icon { font-size: 20px; width: 28px; text-align: center; }
  .move-cancel {
    margin: 8px 16px 0; height: 48px;
    border-radius: 14px; border: none;
    background: var(--bg); color: var(--text-muted);
    font-size: 16px; font-weight: 600;
    cursor: pointer; font-family: inherit; width: calc(100% - 32px);
    display: block;
  }

  /* ── Toast ── */
  .m-toast {
    position: fixed; top: calc(var(--safe-top) + 12px); left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: #1a1a2e; color: #fff;
    padding: 10px 18px; border-radius: 24px;
    font-size: 13px; font-weight: 500;
    z-index: 9999; white-space: nowrap;
    transition: transform .3s cubic-bezier(.32,1,.6,1), opacity .3s;
    opacity: 0; pointer-events: none;
    box-shadow: 0 4px 20px rgba(0,0,0,.3);
  }
  .m-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* ── Sync indicator ── */
  .m-sync {
    position: fixed; top: calc(var(--safe-top) + 60px); right: 12px;
    font-size: 10px; color: var(--text-muted); z-index: 50;
    display: flex; align-items: center; gap: 4px;
    background: var(--card); padding: 3px 8px; border-radius: 20px;
    border: 1px solid var(--border);
    opacity: 0; transition: opacity .3s;
  }
  .m-sync.visible { opacity: 1; }
  .m-sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); }
  .m-sync-dot.syncing { background: var(--warning); animation: pulse 1s infinite; }
  .m-sync-dot.err { background: var(--danger); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* ── Login clear modal ── */
  .login-modal-bg {
    position: fixed; inset: 0; z-index: 500;
    background: rgba(0,0,0,.6);
    display: flex; align-items: flex-end; justify-content: center;
    display: none;
  }
  .login-modal-bg.open { display: flex; }
  .login-modal {
    background: var(--card);
    border-radius: 24px 24px 0 0;
    padding: 24px 24px calc(24px + var(--safe-bottom));
    width: 100%; text-align: center;
  }
  .login-modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
  .login-modal p { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; line-height: 1.5; }
  .login-modal-btns { display: flex; gap: 12px; }
  .login-modal-btns button {
    flex: 1; height: 50px; border-radius: 14px; border: none;
    font-size: 16px; font-weight: 600; cursor: pointer; font-family: inherit;
  }
  .btn-keep { background: var(--bg); color: var(--text); }
  .btn-clear { background: var(--danger); color: #fff; }

  /* ── Loading ── */
  .m-loading {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
    color: var(--text-muted); font-size: 14px;
  }
  .m-spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- PROFILE SCREEN -->
<div id="screen-profile" class="screen active">
  <div class="profile-logo">BS Clients</div>
  <div class="profile-sub">Who's signing in?</div>
  <div class="profile-cards">
    <div class="profile-card" onclick="M.loginPrompt('jay')">
      <div class="profile-avatar" style="background:#1e3a5f">J</div>
      <div class="profile-name">Jay</div>
      <div class="profile-role">Admin</div>
    </div>
    <div class="profile-card" onclick="M.loginPrompt('cath')">
      <div class="profile-avatar" style="background:#be185d">C</div>
      <div class="profile-name">Cath</div>
      <div class="profile-role">Admin</div>
    </div>
  </div>
</div>

<!-- APP SCREEN -->
<div id="screen-app" class="screen">
  <!-- Header -->
  <div class="m-header">
    <div class="m-header-title" id="m-header-title">Leads</div>
    <span class="m-header-count" id="m-header-count">0</span>
    <button class="m-header-btn" onclick="M.refresh()" title="Refresh">⟳</button>
    <button class="m-header-btn" onclick="M.logout()" title="Exit">⏏</button>
  </div>

  <!-- Search -->
  <div class="m-search">
    <div class="m-search-wrap">
      <span class="m-search-icon">🔍</span>
      <input type="search" id="m-search-input" placeholder="Search name, phone, email…"
             oninput="M.search(this.value)">
    </div>
  </div>

  <!-- Lead List -->
  <div class="m-list" id="m-list">
    <div class="m-loading">
      <div class="m-spinner"></div>
      Loading leads…
    </div>
  </div>

  <!-- Bottom Tab Bar -->
  <div class="m-tabbar" id="m-tabbar"></div>
</div>

<!-- DETAIL SHEET -->
<div class="detail-sheet" id="detail-sheet">
  <div class="detail-backdrop" onclick="M.closeDetail()"></div>
  <div class="detail-panel" id="detail-panel">
    <div class="detail-handle"></div>
    <div class="detail-header" id="detail-header"></div>
    <div class="detail-body" id="detail-body"></div>
  </div>
</div>

<!-- MOVE SHEET -->
<div class="move-sheet" id="move-sheet">
  <div class="move-backdrop" onclick="M.closeMove()"></div>
  <div class="move-panel" id="move-panel"></div>
</div>

<!-- LOGIN CLEAR MODAL -->
<div class="login-modal-bg" id="login-modal-bg">
  <div class="login-modal">
    <h3>🗂️ Start Fresh?</h3>
    <p>Clear all checkboxes and the EOD log across all tabs for today?</p>
    <div class="login-modal-btns">
      <button class="btn-keep" onclick="M.loginAnswer(false)">No, Keep</button>
      <button class="btn-clear" onclick="M.loginAnswer(true)">Yes, Clear</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="m-toast" id="m-toast"></div>

<!-- SYNC -->
<div class="m-sync" id="m-sync">
  <div class="m-sync-dot" id="m-sync-dot"></div>
  <span id="m-sync-text">Synced</span>
</div>

<!-- SHARED JS FILES (same as desktop) -->
<script src="config.js"></script>
<script src="state.js"></script>
<script src="api.js"></script>

<script>
// ============================================================
// BS Clients — Mobile App
// iPhone 13 optimized (390×844)
// ============================================================
const M = (() => {
  // ── State ──────────────────────────────────────────────────
  let activeTab   = 'intake';
  let currentUser = null;
  let pendingLoginUser = null;
  let currentLead = null;
  let currentLeadTab = null;
  let searchQ     = '';
  let syncTimer   = null;

  const TAB_ICONS = {
    intake:'📥', pc:'📋', star:'⭐', o:'🔵',
    dbb:'🟡', clients:'✅', retainer:'📁', drop:'🗑️'
  };

  // ── Boot ───────────────────────────────────────────────────
  function boot() {
    const stored = localStorage.getItem('bs_mobile_user');
    if (stored) {
      // Skip login screen — go straight in
      _doEnter(stored, false);
    }
  }

  function loginPrompt(userKey) {
    pendingLoginUser = userKey;
    document.getElementById('login-modal-bg').classList.add('open');
  }

  function loginAnswer(shouldClear) {
    document.getElementById('login-modal-bg').classList.remove('open');
    if (!pendingLoginUser) return;
    _doEnter(pendingLoginUser, shouldClear);
    pendingLoginUser = null;
  }

  async function _doEnter(userKey, shouldClear) {
    window.USERS = window.USERS || {
      jay:  { key:'jay',  name:'Jay',  color:'#1e3a5f', initial:'J' },
      cath: { key:'cath', name:'Cath', color:'#be185d', initial:'C' }
    };
    currentUser = window.USERS[userKey] || { key: userKey, name: userKey, color:'#1e3a5f', initial: userKey[0].toUpperCase() };
    window.currentUser = currentUser;
    localStorage.setItem('bs_mobile_user', userKey);

    window.resetState?.();
    _loadScriptUrl();

    _show('screen-app');
    _show('screen-profile', false);

    _buildTabBar();
    setTab('intake');
    await _loadData();

    if (shouldClear) _clearAll();
  }

  function logout() {
    localStorage.removeItem('bs_mobile_user');
    currentUser = null;
    window.currentUser = null;
    _show('screen-profile');
    _show('screen-app', false);
    document.getElementById('m-search-input').value = '';
    searchQ = '';
  }

  // ── Data ───────────────────────────────────────────────────
  function _loadScriptUrl() {
    const p = window.userPrefix ? window.userPrefix() : 'bs_' + (currentUser?.key||'jay') + '_';
    window.SCRIPT_URL = localStorage.getItem(p + 'script_url') || localStorage.getItem('bs_script_url') || '';
  }

  async function _loadData() {
    if (!window.SCRIPT_URL) {
      toast('⚠️ No Apps Script URL set');
      renderList();
      return;
    }
    _syncStatus('syncing', 'Loading…');
    try {
      const [lr, mr] = await Promise.all([
        window.api({ action: 'getAll' }),
        window.api({ action: 'getMeta' })
      ]);
      const allTabs = window.ALL_TABS || ['intake','pc','star','o','dbb','clients','retainer','drop'];
      const sheetLeads = lr.leads || {};
      allTabs.forEach(t => {
        window.state.leads[t] = (sheetLeads[t] || []);
      });
      window.state.templates    = mr.templates   || [];
      window.state.attorneys    = mr.attorneys   || ['Binh','Faris','Samantha'];
      window.state.eod          = mr.eod         || [];
      window.state.emailHistory = mr.emailHistory || {};
      _syncStatus('ok', 'Synced');
      renderList();
      _updateAllBadges();
    } catch(e) {
      _syncStatus('err', 'Error');
      toast('❌ Load failed: ' + (e.message||''));
      renderList();
    }
  }

  async function refresh() {
    document.getElementById('m-list').innerHTML = '<div class="m-loading"><div class="m-spinner"></div>Refreshing…</div>';
    await _loadData();
    toast('✓ Refreshed');
  }

  // ── Tabs ───────────────────────────────────────────────────
  function _buildTabBar() {
    const allTabs = window.ALL_TABS || ['intake','pc','star','o','dbb','clients','retainer','drop'];
    const labels  = window.TAB_LABELS || { intake:'Intake',pc:'PC',star:'Star',o:'O',dbb:'DBB',clients:'Clients',retainer:'Retainer',drop:'Drop' };
    const bar = document.getElementById('m-tabbar');
    bar.innerHTML = allTabs.map(t => `
      <button class="m-tab ${t===activeTab?'active':''}" id="mtab-${t}" onclick="M.setTab('${t}')">
        <span class="m-tab-icon">${TAB_ICONS[t]||'📂'}</span>
        <span class="m-tab-label">${labels[t]||t}</span>
        <span class="m-tab-badge" id="mbadge-${t}"></span>
      </button>`).join('');
  }

  function setTab(tab) {
    activeTab = tab;
    searchQ = '';
    document.getElementById('m-search-input').value = '';
    // Update tab bar active state
    document.querySelectorAll('.m-tab').forEach(el => el.classList.remove('active'));
    document.getElementById('mtab-' + tab)?.classList.add('active');
    // Scroll active tab into view
    document.getElementById('mtab-' + tab)?.scrollIntoView({ inline: 'center', behavior: 'smooth' });
    renderList();
  }

  // ── Render list ────────────────────────────────────────────
  function _getLeads() {
    let leads = (window.state?.leads?.[activeTab] || []);
    if (searchQ) {
      const q = searchQ.toLowerCase();
      leads = leads.filter(l =>
        (l.name||'').toLowerCase().includes(q) ||
        (l.phone||'').includes(q) ||
        (l.email||'').toLowerCase().includes(q));
    }
    return leads;
  }

  function renderList() {
    const leads = _getLeads();
    const labels = window.TAB_LABELS || {};
    document.getElementById('m-header-title').textContent = (labels[activeTab]||activeTab) + ' Leads';
    document.getElementById('m-header-count').textContent = leads.length;

    if (!leads.length) {
      document.getElementById('m-list').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">${TAB_ICONS[activeTab]||'📂'}</div>
          ${searchQ ? 'No results for "' + searchQ + '"' : 'No leads here yet.'}
        </div>`;
      return;
    }

    document.getElementById('m-list').innerHTML = leads.map(l => _renderCard(l)).join('');
  }

  function _renderCard(l) {
    const initial = (l.name||'?')[0].toUpperCase();
    const ffup    = _normalizeDate(l.ffup);
    const today   = _todayMD();
    const isToday = ffup && ffup === today;
    const isOverdue = ffup && _isOverdue(l);
    const isStarred = !!l.starred;
    const isReview  = l.rowAlert === 'review';
    const isDrop    = l.rowAlert === 'drop';
    const hasReply  = !!l._hasUnreadReply;

    let cardClass = 'lead-card';
    if (isStarred) cardClass += ' starred';
    else if (isReview) cardClass += ' review';
    else if (isDrop) cardClass += ' drop-alert';
    else if (isOverdue) cardClass += ' overdue';

    const statusClass = (l.temp||'').toLowerCase() === 'hot' ? 'hot'
                      : (l.temp||'').toLowerCase() === 'cold' ? 'cold' : '';

    return `
    <div class="${cardClass}" onclick="M.openDetail('${l.id}','${activeTab}')">
      <div class="lead-card-top">
        <div class="lead-avatar">${isStarred?'⭐':initial}</div>
        <div class="lead-info">
          <div class="lead-name">${l.name||'—'} ${hasReply?'<span class="badge badge-new">NEW</span>':''}</div>
          <div class="lead-meta">${l.phone||''} ${l.phone&&l.email?'·':''} ${l.email||''}</div>
        </div>
      </div>
      <div class="lead-badges">
        ${l.temp?`<span class="badge badge-status ${statusClass}">${l.temp}</span>`:''}
        ${l.attorney?`<span class="badge badge-atty">${l.attorney}</span>`:''}
        ${ffup?`<span class="badge badge-ffup${isToday?' today':''}">${isToday?'📅 Today':ffup}</span>`:''}
        ${isOverdue?`<span class="badge badge-overdue">⚠️ Overdue</span>`:''}
      </div>
      <div class="lead-chk-row" onclick="event.stopPropagation()">
        ${['call','vm','emailChk','text','upload'].map((f,i) =>
          `<label class="chk-item">
            <input type="checkbox" ${l[f]?'checked':''} onchange="M.toggleChk('${activeTab}','${l.id}','${f}',this.checked)">
            ${['Call','VM','Email','Text','Upl'][i]}
          </label>`).join('')}
      </div>
    </div>`;
  }

  function _updateAllBadges() {
    const allTabs = window.ALL_TABS || Object.keys(window.state?.leads||{});
    allTabs.forEach(t => {
      const n = (window.state?.leads?.[t]||[]).length;
      const el = document.getElementById('mbadge-' + t);
      if (el) { el.textContent = n > 0 ? n : ''; el.dataset.n = n; }
    });
  }

  // ── Search ─────────────────────────────────────────────────
  function search(q) {
    searchQ = q.trim();
    renderList();
  }

  // ── Detail sheet ───────────────────────────────────────────
  function openDetail(id, tab) {
    const leads = window.state?.leads?.[tab] || [];
    const l = leads.find(x => x.id == id);
    if (!l) return;
    currentLead = l;
    currentLeadTab = tab;
    _renderDetail(l, tab);
    const sheet = document.getElementById('detail-sheet');
    sheet.classList.add('open');
  }

  function closeDetail() {
    document.getElementById('detail-sheet').classList.remove('open');
    currentLead = null; currentLeadTab = null;
  }

  function _renderDetail(l, tab) {
    const labels = window.TAB_LABELS || {};
    const ffup   = _normalizeDate(l.ffup) || '—';
    const date   = _normalizeDate(l.date) || '—';

    document.getElementById('detail-header').innerHTML = `
      <div class="detail-avatar" style="background:${_color(l)}">${(l.name||'?')[0].toUpperCase()}</div>
      <div style="flex:1;min-width:0">
        <div class="detail-name">${l.name||'—'}</div>
        <div class="detail-sub">${labels[tab]||tab} · Added ${date}</div>
      </div>
      <button class="detail-close" onclick="M.closeDetail()">✕</button>`;

    const attorneys = (window.state?.attorneys||[]);
    const templates = (window.state?.templates||[]);
    const statusOpts = ['Hot','Warm','Cold','Closed','On Hold','Retainer','Drop','Pending'];

    document.getElementById('detail-body').innerHTML = `
      <!-- Contact -->
      <div class="detail-section">
        <div class="detail-section-title">Contact</div>
        <div class="detail-row">
          <div class="detail-row-icon">📞</div>
          <div class="detail-row-label">Phone</div>
          <div class="detail-row-value">${l.phone?`<a href="tel:${l.phone}">${l.phone}</a>`:'—'}</div>
        </div>
        <div class="detail-row">
          <div class="detail-row-icon">📧</div>
          <div class="detail-row-label">Email</div>
          <div class="detail-row-value">${l.email?`<a href="mailto:${l.email}">${l.email}</a>`:'—'}</div>
        </div>
        <div class="detail-row">
          <div class="detail-row-icon">📅</div>
          <div class="detail-row-label">Follow-up</div>
          <div class="detail-row-value">${ffup}</div>
        </div>
        ${l.gdrive?`<div class="detail-row">
          <div class="detail-row-icon">🔗</div>
          <div class="detail-row-label">Drive</div>
          <div class="detail-row-value"><a href="${l.gdrive}" target="_blank">Open Drive</a></div>
        </div>`:''}
      </div>

      <!-- Status & Attorney -->
      <div class="detail-section">
        <div class="detail-section-title">Assignment</div>
        <div class="detail-row">
          <div class="detail-row-icon">🌡️</div>
          <div class="detail-row-label">Status</div>
          <select class="inline-select" onchange="M.updateField('temp',this.value)">
            <option value="">—</option>
            ${statusOpts.map(s=>`<option value="${s}" ${l.temp===s?'selected':''}>${s}</option>`).join('')}
          </select>
        </div>
        <div class="detail-row">
          <div class="detail-row-icon">⚖️</div>
          <div class="detail-row-label">Attorney</div>
          <select class="inline-select" onchange="M.updateField('attorney',this.value)">
            <option value="">—</option>
            ${attorneys.map(a=>`<option value="${a}" ${l.attorney===a?'selected':''}>${a}</option>`).join('')}
          </select>
        </div>
        <div class="detail-row">
          <div class="detail-row-icon">📑</div>
          <div class="detail-row-label">Template</div>
          <select class="inline-select" onchange="M.updateField('level',this.value)">
            <option value="">— Select —</option>
            ${templates.map(t=>`<option value="${t.name}" ${l.level===t.name?'selected':''}>${t.name}</option>`).join('')}
          </select>
        </div>
      </div>

      <!-- Checkboxes -->
      <div class="detail-section">
        <div class="detail-section-title">Checklist</div>
        <div class="detail-chk-grid">
          ${[['call','📞','Call'],['vm','📬','VM'],['emailChk','📧','Email'],['text','💬','Text'],['upload','📤','Upload']].map(([f,ic,lb])=>`
          <div class="detail-chk-item">
            <input type="checkbox" ${l[f]?'checked':''} onchange="M.toggleChk('${tab}','${l.id}','${f}',this.checked)">
            <div class="detail-chk-label">${lb}</div>
          </div>`).join('')}
        </div>
      </div>

      <!-- Notes -->
      <div class="detail-section">
        <div class="detail-section-title">Notes</div>
        <textarea class="detail-notes-input" id="detail-notes"
          placeholder="Add a note…" onblur="M.saveNotes(this.value)">${l.notes||''}</textarea>
      </div>

      <!-- Actions -->
      <div class="detail-section">
        <div class="detail-section-title">Actions</div>
        <div class="detail-actions">
          <button class="detail-action-btn primary" onclick="M.openMove()">📂 Move to…</button>
          ${l.phone?`<button class="detail-action-btn" onclick="window.open('tel:${l.phone}')">📞 Call</button>`:'<button class="detail-action-btn" disabled style="opacity:.4">📞 Call</button>'}
          ${l.email?`<button class="detail-action-btn" onclick="window.open('mailto:${l.email}')">📧 Email</button>`:'<button class="detail-action-btn" disabled style="opacity:.4">📧 Email</button>'}
          ${l.gdrive?`<button class="detail-action-btn" onclick="window.open('${l.gdrive}','_blank')">🔗 Drive</button>`:'<button class="detail-action-btn danger" onclick="M.closeDetail()">✕ Close</button>'}
        </div>
      </div>
    `;
  }

  // ── Field updates ─────────────────────────────────────────
  function updateField(field, value) {
    if (!currentLead || !currentLeadTab) return;
    currentLead[field] = value;
    _queueLeadSave();
    toast('✓ Saved');
  }

  function saveNotes(value) {
    if (!currentLead || !currentLeadTab) return;
    if (currentLead.notes === value) return;
    currentLead.notes = value;
    _queueLeadSave();
    toast('✓ Note saved');
  }

  function toggleChk(tab, id, field, val) {
    const leads = window.state?.leads?.[tab] || [];
    const l = leads.find(x => x.id == id);
    if (!l) return;
    l[field] = val;
    if (currentLead && currentLead.id == id) currentLead[field] = val;
    window._queueSave?.({ action:'updateLead', tab, lead: JSON.stringify(l) });
    _addEOD(l, tab, field, val);
  }

  function _queueLeadSave() {
    if (!currentLead || !currentLeadTab) return;
    window._queueSave?.({ action:'updateLead', tab: currentLeadTab, lead: JSON.stringify(currentLead) });
    // Update in state array
    const idx = (window.state?.leads?.[currentLeadTab]||[]).findIndex(x => x.id == currentLead.id);
    if (idx > -1) window.state.leads[currentLeadTab][idx] = { ...currentLead };
    renderList();
  }

  function _addEOD(l, tab, field, val) {
    if (!val) return;
    const labels = window.TAB_LABELS || {};
    const actions = { call:'Called', vm:'Left VM', emailChk:'Emailed', text:'Texted', upload:'Uploaded' };
    const entry = {
      id: Date.now().toString(),
      name: l.name,
      tab,
      action: actions[field] || field,
      time: new Date().toLocaleTimeString('en-PH', { hour:'2-digit', minute:'2-digit' })
    };
    window.state.eod = window.state.eod || [];
    window.state.eod.unshift(entry);
    window._queueSave?.({ action:'saveMeta', eod: JSON.stringify(window.state.eod) });
  }

  // ── Move sheet ────────────────────────────────────────────
  function openMove() {
    if (!currentLead || !currentLeadTab) return;
    const allTabs = window.ALL_TABS || ['intake','pc','star','o','dbb','clients','retainer','drop'];
    const labels  = window.TAB_LABELS || {};
    const dests   = allTabs.filter(t => t !== currentLeadTab);
    const panel   = document.getElementById('move-panel');
    panel.innerHTML = `
      <div class="move-title">Move "${currentLead.name}" to…</div>
      ${dests.map(t => `
        <div class="move-item" onclick="M.moveTo('${t}')">
          <span class="move-item-icon">${TAB_ICONS[t]||'📂'}</span>
          ${labels[t]||t}
        </div>`).join('')}
      <button class="move-cancel" onclick="M.closeMove()">Cancel</button>`;
    document.getElementById('move-sheet').classList.add('open');
  }

  function closeMove() {
    document.getElementById('move-sheet').classList.remove('open');
  }

  async function moveTo(destTab) {
    if (!currentLead || !currentLeadTab) return;
    closeMove();
    const labels = window.TAB_LABELS || {};
    const lead   = { ...currentLead };
    const srcTab = currentLeadTab;

    // Remove from source
    window.state.leads[srcTab] = (window.state.leads[srcTab]||[]).filter(x => x.id != lead.id);
    // Add to dest
    window.state.leads[destTab] = window.state.leads[destTab] || [];
    window.state.leads[destTab].unshift(lead);

    closeDetail();
    renderList();
    _updateAllBadges();

    toast(`✓ Moved to ${labels[destTab]||destTab}`);

    try {
      await window.api?.({ action:'moveLead', id: lead.id, from: srcTab, to: destTab });
      _syncStatus('ok', 'Synced');
    } catch(e) {
      toast('❌ Move failed — ' + e.message);
      _syncStatus('err', 'Error');
    }
  }

  // ── Clear all ─────────────────────────────────────────────
  function _clearAll() {
    const CHK = ['call','vm','emailChk','text','upload'];
    const allTabs = window.ALL_TABS || Object.keys(window.state?.leads||{});
    allTabs.forEach(tab => {
      (window.state?.leads?.[tab]||[]).forEach(l => {
        if (CHK.some(f => l[f])) {
          CHK.forEach(f => l[f] = false);
          window._queueSave?.({ action:'updateLead', tab, lead: JSON.stringify(l) });
        }
      });
    });
    window.state.eod = [];
    window._queueSave?.({ action:'saveMeta', eod:'[]' });
    renderList();
    toast('✓ Checkboxes & EOD cleared');
  }

  // ── Sync UI ───────────────────────────────────────────────
  function _syncStatus(status, text) {
    const dot = document.getElementById('m-sync-dot');
    const txt = document.getElementById('m-sync-text');
    const bar = document.getElementById('m-sync');
    dot.className = 'm-sync-dot' + (status==='syncing'?' syncing':status==='err'?' err':'');
    txt.textContent = text;
    bar.classList.add('visible');
    clearTimeout(syncTimer);
    if (status === 'ok') syncTimer = setTimeout(() => bar.classList.remove('visible'), 2500);
    // Hook into global setSyncStatus
    window.setSyncStatus = _syncStatus;
  }

  // ── Toast ─────────────────────────────────────────────────
  let toastTimer;
  function toast(msg) {
    const el = document.getElementById('m-toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
  }

  // ── Helpers ───────────────────────────────────────────────
  function _show(id, yes=true) {
    const el = document.getElementById(id);
    if (yes) { el.classList.add('active'); }
    else      { el.classList.remove('active'); }
  }

  function _normalizeDate(d) {
    if (!d) return '';
    // M/D/YY or M/D
    const parts = String(d).split('/');
    if (parts.length >= 2) return parts[0] + '/' + parts[1];
    return d;
  }

  function _todayMD() {
    const now = new Date(new Date().toLocaleString('en-US', { timeZone:'Asia/Manila' }));
    return `${now.getMonth()+1}/${now.getDate()}`;
  }

  function _isOverdue(l) {
    const ffup = _normalizeDate(l.ffup);
    if (!ffup) return false;
    const today = _todayMD();
    const [tm, td] = today.split('/').map(Number);
    const [fm, fd] = ffup.split('/').map(Number);
    return fm < tm || (fm === tm && fd < td);
  }

  function _color(l) {
    const attyColors = { Binh:'#1e3a5f', Faris:'#7c3aed', Samantha:'#be185d' };
    return attyColors[l.attorney] || '#1e3a5f';
  }

  // ── Public API ────────────────────────────────────────────
  return {
    loginPrompt, loginAnswer, logout, refresh,
    setTab, search,
    openDetail, closeDetail,
    openMove, closeMove, moveTo,
    updateField, saveNotes, toggleChk,
    toast, boot
  };
})();

// Boot on load
window.addEventListener('DOMContentLoaded', () => {
  window._loadCustomTabs?.();
  M.boot();
});
</script>
</body>
</html>
